server.port=8089
spring.application.name=ui-service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.routes[1].id=comment-service
spring.cloud.gateway.routes[1].uri=http://localhost:8083
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/topics/*/comments/**,/api/v1/topics/*/comments,/api/v1/comments/**

spring.cloud.gateway.routes[2].id=topic-service
spring.cloud.gateway.routes[2].uri=http://localhost:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/topics/**

spring.cloud.gateway.routes[3].id=reaction-service
spring.cloud.gateway.routes[3].uri=http://localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/reactions/**

spring.cloud.gateway.routes[4].id=report-service
spring.cloud.gateway.routes[4].uri=http://localhost:8085
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/reports/**

spring.cloud.gateway.routes[5].id=admin-service
spring.cloud.gateway.routes[5].uri=http://localhost:8086
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/admin/**

spring.cloud.gateway.routes[6].id=topic-shortcut
spring.cloud.gateway.routes[6].uri=http://localhost:8082
spring.cloud.gateway.routes[6].predicates[0]=Path=/topics/**

spring.cloud.gateway.routes[7].id=comment-shortcut
spring.cloud.gateway.routes[7].uri=http://localhost:8083
spring.cloud.gateway.routes[7].predicates[0]=Path=/comments/**
spring.main.web-application-type=reactive
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
spring.flyway.enabled=false

# Preserve custom headers through gateway
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].exposedHeaders=X-Admin-Username,X-User-Id,X-User-Role,Content-Type
