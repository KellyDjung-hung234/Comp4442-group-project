# GitHub Actions CI/CD Pipeline
name: CI/CD Deploy to EC2

on:
  push:
    branches: [ main ] 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Common Shared Library
        working-directory: backend/common-shared
        run: mvn clean install -DskipTests

      - name: Build All Microservices
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Build UI Service Jar
        working-directory: backend/ui-service
        run: |
          if [ -x ./mvnw ]; then
            ./mvnw clean package -DskipTests
          else
            mvn clean package -DskipTests
          fi
          test -f target/ui-service-0.0.1-SNAPSHOT.jar

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Images
        working-directory: backend
        run: |
          
          for service in auth topic comment reaction report admin ui; do
            image_name="shareu-${service}"
            docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/${image_name}:latest ./${service}-service
            docker push ${{ secrets.DOCKER_USERNAME }}/${image_name}:latest
          done

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }} 
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            
            export KUBECONFIG=~/.kube/config

            kubectl create secret generic shareu-mail-secrets \
              --from-literal=MAIL_USERNAME='${{ secrets.MAIL_USERNAME }}' \
              --from-literal=MAIL_PASSWORD='${{ secrets.MAIL_PASSWORD }}' \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl set env deployment/shareu-auth --from=secret/shareu-mail-secrets
            
           
            for service in auth topic comment reaction report admin ui; do
              kubectl set image deployment/shareu-${service} ${service}-service=${{ secrets.DOCKER_USERNAME }}/shareu-${service}:latest
              kubectl rollout restart deployment shareu-${service}
            done
            
           
            kubectl rollout status deployment shareu-ui --timeout=300s
